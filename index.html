<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=dashboard/" />
    <title>AI-Powered Business Intelligence Dashboard</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #17202a;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(680px, calc(100% - 32px));
        padding: 28px;
        background: #ffffff;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        box-shadow: 0 14px 32px rgba(24, 35, 53, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.7rem, 5vw, 3rem);
        line-height: 1;
      }

      p {
        margin: 0 0 18px;
        color: #667085;
        line-height: 1.55;
      }

      a {
        color: #255e91;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI-Powered Business Intelligence Dashboard</h1>
      <p>Opening the interactive dashboard.</p>
      <a href="dashboard/">Open dashboard</a>
    </main>
  </body>
</html>
